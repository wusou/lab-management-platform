services:
  migrate:
    build:
      context: .
      target: api-prod
    command: pnpm --filter @lab/api db:migrate
    env_file:
      - path: .env.production
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - migrate

  api:
    build:
      context: .
      target: api-prod
    env_file:
      - path: .env.production
        required: false
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      target: web-prod
      args:
        VITE_API_BASE_URL: /api
    env_file:
      - path: .env.production
        required: false
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-lab_management}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lab} -d ${POSTGRES_DB:-lab_management}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  postgres-data:
